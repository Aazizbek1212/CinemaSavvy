{% extends "base.html" %}
{% block title %}Parol tiklandi — Cinema.uz{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md text-center animate-scale-in">
    <div class="glass-card p-10">
      <div class="w-20 h-20 rounded-full bg-emerald-500/15
                  border-2 border-emerald-500/30
                  flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-emerald-400" fill="none"
             stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2"
                d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0
                   002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2
                   2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white mb-3">
        Parol muvaffaqiyatli tiklandi!
      </h1>
      <p class="text-ink-400 text-sm mb-8">
        Endi yangi parol bilan kirishingiz mumkin.
      </p>
      <a href="{% url 'auth:login' %}" class="btn-gold w-full py-3">
        Kirish
      </a>
    </div>
  </div>
</div>
{% endblock %}
