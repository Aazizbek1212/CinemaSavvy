{% extends "base.html" %}
{% block title %}Kirish — Cinema.uz{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center px-4 py-12">

  <!-- Background glow -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2
                w-96 h-96 rounded-full bg-gold-500/3 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative animate-scale-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="{% url 'home' %}" class="inline-flex flex-col items-center gap-3 group">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gold-500 to-gold-700
                    flex items-center justify-center shadow-gold-lg
                    group-hover:scale-105 transition-transform duration-200">
          <svg class="w-7 h-7 text-ink-950" fill="currentColor" viewBox="0 0 24 24">
            <path d="M18 4H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM9 17V7l8 5-8 5z"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-white">
          Cinema<span class="text-gradient-gold">.uz</span>
        </span>
      </a>
      <p class="text-ink-400 mt-2 text-sm">Hisobingizga kiring</p>
    </div>

    <!-- Card -->
    <div class="glass-card p-8 shadow-card">

      <!-- Error -->
      {% if form.errors %}
        <div class="flex items-center gap-3 bg-crimson-500/10 border border-crimson-500/30
                    rounded-xl p-4 mb-6 animate-fade-in">
          <svg class="w-5 h-5 text-crimson-400 flex-shrink-0" fill="none"
               stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-crimson-300 text-sm">Email yoki parol noto'g'ri.</p>
        </div>
      {% endif %}

      <form method="post" action="{% url 'auth:login' %}" class="space-y-5"
            x-data="{ showPassword: false }">
        {% csrf_token %}

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-ink-300 mb-2
                        uppercase tracking-wider">
            Email manzil
          </label>
          <input type="email" name="email" required autocomplete="email"
                 placeholder="email@example.com"
                 class="input-field" />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-semibold text-ink-300 uppercase tracking-wider">
              Parol
            </label>
            <a href="{% url 'auth:password-reset' %}"
               class="text-gold-500 hover:text-gold-400 text-xs transition-colors">
              Unutdingizmi?
            </a>
          </div>
          <div class="relative">
            <input name="password"
                   required
                   autocomplete="current-password"
                   placeholder="••••••••"
                   x-bind:type="showPassword ? 'text' : 'password'"
                   class="input-field pr-11" />
            <button type="button"
                    x-on:click="showPassword = !showPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2
                           text-ink-400 hover:text-ink-200 transition-colors">
              <svg x-show="!showPassword" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268
                         2.943 9.542 7-1.274 4.057-5.064 7-9.542
                         7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPassword" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478
                         0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029
                         m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242
                         4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29
                         3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478
                         0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132
                         5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-gold w-full py-3 text-base mt-2">
          Kirish
        </button>

        <!-- Divider -->
        <div class="relative my-2">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-ink-700"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="px-3 bg-ink-800 text-ink-500 text-xs">yoki</span>
          </div>
        </div>

        <!-- Google login -->
        <a href="{% url 'social:begin' 'google-oauth2' %}"
           class="btn-ghost w-full py-3 text-sm">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google orqali kirish
        </a>
      </form>

      <p class="text-center text-ink-500 text-sm mt-6">
        Hisob yo'qmi?
        <a href="{% url 'auth:register' %}"
           class="text-gold-500 hover:text-gold-400 font-medium transition-colors">
          Ro'yxatdan o'tish
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
