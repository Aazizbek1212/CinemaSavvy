{% extends "base.html" %}
{% block title %}Yangi parol — Cinema.uz{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md animate-scale-in">

    <div class="text-center mb-8">
      <a href="{% url 'home' %}"
         class="inline-flex flex-col items-center gap-3">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br
                    from-gold-500 to-gold-700
                    flex items-center justify-center shadow-gold-lg">
          <svg class="w-7 h-7 text-ink-950" fill="currentColor"
               viewBox="0 0 24 24">
            <path d="M18 4H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1
                     0 2-.9 2-2V6c0-1.1-.9-2-2-2zM9 17V7l8 5-8 5z"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-white">
          Cinema<span class="text-gradient-gold">.uz</span>
        </span>
      </a>
    </div>

    <div class="glass-card p-8"
         x-data="{ showNew: false, showConfirm: false }">
      <h2 class="text-white font-bold text-lg mb-1">Yangi parol</h2>
      <p class="text-ink-400 text-sm mb-6">
        Xavfsiz va kuchli parol o'rnating.
      </p>

      {% if error %}
        <div class="flex items-center gap-2 bg-crimson-500/10
                    border border-crimson-500/30 rounded-xl p-3 mb-5">
          <svg class="w-4 h-4 text-crimson-400 flex-shrink-0"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0
                     11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-crimson-300 text-sm">{{ error }}</span>
        </div>
      {% endif %}

      <form method="post"
            action="{% url 'auth:password-reset-confirm' uid=uid token=token %}"
            class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="uid"   value="{{ uid }}" />
        <input type="hidden" name="token" value="{{ token }}" />

        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            Yangi parol
          </label>
          <div class="relative">
            <input name="new_password" required
                   :type="showNew ? 'text' : 'password'"
                   placeholder="Kamida 8 ta belgi"
                   class="input-field pr-11" />
            <button type="button" @click="showNew = !showNew"
                    class="absolute right-3 top-1/2 -translate-y-1/2
                           text-ink-400 hover:text-ink-200 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458
                         12C3.732 7.943 7.523 5 12 5c4.478 0 8.268
                         2.943 9.542 7-1.274 4.057-5.064 7-9.542
                         7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            Parolni tasdiqlash
          </label>
          <div class="relative">
            <input name="new_password_confirm" required
                   :type="showConfirm ? 'text' : 'password'"
                   placeholder="Parolni qayta kiriting"
                   class="input-field pr-11" />
            <button type="button" @click="showConfirm = !showConfirm"
                    class="absolute right-3 top-1/2 -translate-y-1/2
                           text-ink-400 hover:text-ink-200 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458
                         12C3.732 7.943 7.523 5 12 5c4.478 0 8.268
                         2.943 9.542 7-1.274 4.057-5.064 7-9.542
                         7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-gold w-full py-3 mt-2">
          Parolni saqlash
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
