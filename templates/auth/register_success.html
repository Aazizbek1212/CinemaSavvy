{% extends "base.html" %}
{% block title %}Ro'yxatdan o'tdingiz — Cinema.uz{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md text-center animate-scale-in">
    <div class="glass-card p-10">
      <div class="w-20 h-20 rounded-full bg-emerald-500/15
                  border-2 border-emerald-500/30
                  flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-emerald-400" fill="none"
             stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white mb-3">
        Ro'yxatdan o'tdingiz!
      </h1>
      <p class="text-ink-400 text-sm mb-2">
        Emailingizga tasdiqlash havolasi yuborildi.
      </p>
      <p class="text-ink-500 text-xs mb-8">
        Spam papkasini ham tekshiring.
      </p>
      <a href="{% url 'auth:login' %}" class="btn-gold w-full py-3">
        Kirish sahifasiga o'tish
      </a>
    </div>
  </div>
</div>
{% endblock %}
