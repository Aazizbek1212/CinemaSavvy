<!-- templates/auth/register.html -->
{% extends "base.html" %}
{% block title %}Ro'yxatdan o'tish — Cinema.uz{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center px-4 py-12">

  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2
                w-96 h-96 rounded-full bg-emerald-500/3 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative animate-scale-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="{% url 'home' %}"
         class="inline-flex flex-col items-center gap-3 group">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br
                    from-gold-500 to-gold-700
                    flex items-center justify-center shadow-gold-lg
                    group-hover:scale-105 transition-transform duration-200">
          <svg class="w-7 h-7 text-ink-950" fill="currentColor" viewBox="0 0 24 24">
            <path d="M18 4H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0
                     2-.9 2-2V6c0-1.1-.9-2-2-2zM9 17V7l8 5-8 5z"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-white">
          Cinema<span class="text-gradient-gold">.uz</span>
        </span>
      </a>
      <p class="text-ink-400 mt-2 text-sm">Hisob yarating</p>
    </div>

    <div class="glass-card p-8 shadow-card">

      <!-- Error -->
      {% if error %}
        <div class="flex items-center gap-3 bg-crimson-500/10
                    border border-crimson-500/30 rounded-xl p-4 mb-6">
          <svg class="w-5 h-5 text-crimson-400 flex-shrink-0"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-crimson-300 text-sm">{{ error }}</p>
        </div>
      {% endif %}

      <form method="post" action="{% url 'auth:register' %}"
            class="space-y-4"
            x-data="{ showPass: false, showConfirm: false }">
        {% csrf_token %}

        <!-- Full name -->
        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            To'liq ism
          </label>
          <input type="text" name="full_name"
                 value="{{ form_data.full_name|default:'' }}"
                 placeholder="Ism Familiya"
                 autocomplete="name"
                 class="input-field" />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            Email manzil
          </label>
          <input type="email" name="email" required
                 value="{{ form_data.email|default:'' }}"
                 placeholder="email@example.com"
                 autocomplete="email"
                 class="input-field" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            Parol
          </label>
          <div class="relative">
            <input name="password" required
                   :type="showPass ? 'text' : 'password'"
                   placeholder="Kamida 8 ta belgi"
                   autocomplete="new-password"
                   class="input-field pr-11" />
            <button type="button" @click="showPass = !showPass"
                    class="absolute right-3 top-1/2 -translate-y-1/2
                           text-ink-400 hover:text-ink-200 transition-colors">
              <svg x-show="!showPass" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0
                         8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542
                         7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPass" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478
                         0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029
                         m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242
                         4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29
                         3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478
                         0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132
                         5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm password -->
        <div>
          <label class="block text-xs font-semibold text-ink-300
                        mb-2 uppercase tracking-wider">
            Parolni tasdiqlang
          </label>
          <div class="relative">
            <input name="password_confirm" required
                   :type="showConfirm ? 'text' : 'password'"
                   placeholder="Parolni qayta kiriting"
                   autocomplete="new-password"
                   class="input-field pr-11" />
            <button type="button" @click="showConfirm = !showConfirm"
                    class="absolute right-3 top-1/2 -translate-y-1/2
                           text-ink-400 hover:text-ink-200 transition-colors">
              <svg x-show="!showConfirm" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0
                         8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542
                         7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showConfirm" class="w-4 h-4" fill="none"
                   stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478
                         0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029
                         m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242
                         4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29
                         3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478
                         0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132
                         5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Terms -->
        <label class="flex items-start gap-3 cursor-pointer group">
          <input type="checkbox" name="agree" required
                 class="mt-0.5 w-4 h-4 accent-gold-500 flex-shrink-0" />
          <span class="text-xs text-ink-400 leading-relaxed">
            <a href="/terms/" class="text-gold-500 hover:text-gold-400
                                     transition-colors">Foydalanish shartlari</a>
            va
            <a href="/privacy/" class="text-gold-500 hover:text-gold-400
                                       transition-colors">Maxfiylik siyosati</a>
            bilan roziman
          </span>
        </label>

        <button type="submit" class="btn-gold w-full py-3 text-base mt-2">
          Ro'yxatdan o'tish
        </button>
      </form>

      <p class="text-center text-ink-500 text-sm mt-6">
        Hisobingiz bormi?
        <a href="{% url 'auth:login' %}"
           class="text-gold-500 hover:text-gold-400 font-medium transition-colors">
          Kirish
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
