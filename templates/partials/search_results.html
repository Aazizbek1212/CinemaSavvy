{% if results %}
  {% for movie in results %}
    <a href="{% url 'movie-detail' movie.slug %}"
       class="flex items-center gap-3 px-4 py-3
              hover:bg-white/5 transition-colors
              border-b border-white/5 last:border-0">
      <div class="w-8 h-12 rounded-lg bg-ink-700
                  flex-shrink-0 overflow-hidden">
        {% if movie.poster %}
          <img src="{{ movie.poster.url }}"
               class="w-full h-full object-cover" />
        {% else %}
          <div class="w-full h-full flex items-center
                      justify-center text-ink-500 text-xs">
            🎬
          </div>
        {% endif %}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-medium truncate">
          {{ movie.title }}
        </p>
        <p class="text-ink-500 text-xs">{{ movie.release_year }}</p>
      </div>
      {% if movie.average_rating > 0 %}
        <div class="flex items-center gap-1 flex-shrink-0">
          <svg class="w-3 h-3 text-gold-500" fill="currentColor"
               viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07
                     3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588
                     1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3
                     .921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175
                     0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07
                     -3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38
                     -1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
          <span class="text-gold-400 text-xs font-medium">
            {{ movie.average_rating }}
          </span>
        </div>
      {% endif %}
    </a>
  {% endfor %}
  <a href="{% url 'search:search-page' %}?q={{ query }}"
     class="flex items-center justify-center gap-2 px-4 py-3
            text-gold-500 hover:text-gold-400 text-xs font-medium
            hover:bg-gold-500/5 transition-colors">
    Barcha natijalarni ko'rish →
  </a>
{% else %}
  <div class="px-4 py-6 text-center text-ink-500 text-sm">
    Hech narsa topilmadi
  </div>
{% endif %}
