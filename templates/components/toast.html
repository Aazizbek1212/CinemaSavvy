<div x-data="toastManager()"
     @show-toast.window="addToast($event.detail)"
     class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">

  <template x-for="toast in toasts" :key="toast.id">
    <div x-show="toast.visible"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-end="opacity-0"
         :class="{
           'bg-green-600': toast.type === 'success',
           'bg-red-600': toast.type === 'error',
           'bg-blue-600': toast.type === 'info',
         }"
         class="pointer-events-auto flex items-center gap-3 px-4 py-3
                rounded-xl shadow-xl text-white text-sm font-medium min-w-64">
      <span x-text="toast.type === 'success' ? '✅' : toast.type === 'error' ? '❌' : 'ℹ️'"></span>
      <span x-text="toast.message" class="flex-1"></span>
      <button @click="removeToast(toast.id)" class="text-white/70 hover:text-white">✕</button>
    </div>
  </template>
</div>
