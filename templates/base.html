<!DOCTYPE html>
<html lang="uz" class="dark" x-data="appState()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="description" content="{% block meta_description %}CinemaSavvy — Premium kino platformasi{% endblock %}" />
  <title>{% block title %}CinemaSavvy{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              950: '#0A0A0F', 900: '#12121A', 800: '#1A1A26',
              700: '#242432', 600: '#2E2E3E', 500: '#3A3A50',
              400: '#525268', 300: '#6B6B82', 200: '#A3A3B8',
            },
            gold: {
              300: '#F0E6C8', 400: '#C9A84C', 500: '#C9A84C',
              600: '#A8872A', 700: '#876808',
            },
            emerald: { 400: '#70C085', 500: '#1A5C2E', 600: '#144A24' },
            crimson: { 400: '#E07070', 500: '#8B1A1A', 600: '#701515' },
          },
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            label: ['Bebas Neue', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <!-- Video.js -->
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.6.1/video-js.css" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  <style>
    :root {
      --gold: #C9A84C;
      --gdim: rgba(201,168,76,0.15);
      --gmid: rgba(201,168,76,0.3);
      --bg: #0A0A0F;
      --bg2: #12121A;
      --bg3: #1A1A26;
      --tx: #F0E6C8;
      --txd: #7A6A52;
      --txm: #3A3028;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Inter', sans-serif;
    }
    ::selection { background: rgba(201,168,76,0.25); color: #C9A84C; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: #3A3028; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* Utility classes */
    .cs-btn-gold {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; background: var(--gold); color: var(--bg);
      border: none; padding: 11px 24px; font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; letter-spacing: 2px; cursor: pointer;
      border-radius: 3px; transition: opacity 0.2s, transform 0.2s;
      text-decoration: none; font-weight: normal;
    }
    .cs-btn-gold:hover { opacity: 0.88; transform: translateY(-1px); }

    .cs-btn-ghost {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; background: transparent; color: var(--tx);
      border: 1px solid var(--gmid); padding: 10px 20px;
      font-family: 'Bebas Neue', sans-serif; font-size: 14px;
      letter-spacing: 2px; cursor: pointer; border-radius: 3px;
      transition: all 0.2s; text-decoration: none;
    }
    .cs-btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    .cs-input {
      width: 100%; background: var(--bg3); border: 1px solid rgba(201,168,76,0.15);
      border-radius: 3px; padding: 11px 40px 11px 14px;
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--tx); outline: none; transition: border-color 0.2s;
    }
    .cs-input::placeholder { color: var(--txm); }
    .cs-input:focus { border-color: var(--gold); }

    .cs-card {
      background: var(--bg3); border: 1px solid rgba(201,168,76,0.1);
      border-radius: 4px;
    }
    .cs-card:hover { border-color: rgba(201,168,76,0.35); }

    .badge-gold {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; background: var(--gdim);
      border: 1px solid var(--gmid); color: var(--gold);
      font-family: 'Bebas Neue', sans-serif; font-size: 11px;
      letter-spacing: 2px; border-radius: 2px;
    }
    .badge-crimson {
      display: inline-flex; align-items: center;
      padding: 3px 10px; background: rgba(139,26,26,0.2);
      border: 1px solid rgba(139,26,26,0.4); color: #E07070;
      font-family: 'Bebas Neue', sans-serif; font-size: 11px;
      letter-spacing: 2px; border-radius: 2px;
    }
    .badge-emerald {
      display: inline-flex; align-items: center;
      padding: 3px 10px; background: rgba(26,92,46,0.2);
      border: 1px solid rgba(26,92,46,0.4); color: #70C085;
      font-family: 'Bebas Neue', sans-serif; font-size: 11px;
      letter-spacing: 2px; border-radius: 2px;
    }

    .glass-card {
      background: rgba(26,26,38,0.7);
      border: 1px solid rgba(201,168,76,0.08);
      border-radius: 4px;
      backdrop-filter: blur(12px);
    }

    .btn-gold { /* backward compat */
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; background: var(--gold); color: var(--bg);
      border: none; padding: 11px 24px;
      font-family: 'Bebas Neue', sans-serif; font-size: 14px;
      letter-spacing: 2px; cursor: pointer; border-radius: 3px;
      transition: opacity 0.2s; text-decoration: none;
    }
    .btn-gold:hover { opacity: 0.88; }
    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; background: transparent; color: var(--tx);
      border: 1px solid var(--gmid); padding: 10px 20px;
      font-family: 'Bebas Neue', sans-serif; font-size: 14px;
      letter-spacing: 2px; cursor: pointer; border-radius: 3px;
      transition: all 0.2s; text-decoration: none;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .input-field {
      width: 100%; background: var(--bg3);
      border: 1px solid rgba(201,168,76,0.15); border-radius: 3px;
      padding: 11px 14px; font-family: 'Inter', sans-serif;
      font-size: 13px; color: var(--tx); outline: none;
      transition: border-color 0.2s;
    }
    .input-field::placeholder { color: var(--txm); }
    .input-field:focus { border-color: var(--gold); }
    .text-gradient-gold {
      background: linear-gradient(135deg, #C9A84C, #F0E6C8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Movie card */
    .movie-card {
      position: relative; border-radius: 4px; overflow: hidden;
      background: var(--bg3); border: 1px solid rgba(201,168,76,0.1);
      transition: all 0.25s; cursor: pointer;
    }
    .movie-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.5);
    }
    .movie-card .poster {
      aspect-ratio: 2/3; width: 100%; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .movie-card:hover .poster { transform: scale(1.04); }
    .movie-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.5) 40%, transparent 70%);
      opacity: 0; transition: opacity 0.25s;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 12px;
    }
    .movie-card:hover .overlay { opacity: 1; }
    .movie-card .play-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(201,168,76,0.15); border: 2px solid rgba(201,168,76,0.6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px; transition: all 0.2s;
    }
    .movie-card:hover .play-btn {
      background: rgba(201,168,76,0.3); border-color: var(--gold);
      transform: scale(1.1);
    }
    .movie-card .info { padding: 10px 10px 12px; }
    .movie-card .title {
      color: var(--tx); font-size: 12px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
    }
    .movie-card .meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--txd);
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
    }
    .movie-card .rating {
      display: flex; align-items: center; gap: 3px; color: var(--gold);
      font-family: 'Bebas Neue', sans-serif; font-size: 12px;
    }
    .badge-premium {
      position: absolute; top: 7px; left: 7px;
      background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); font-size: 9px; font-weight: 800;
      padding: 2px 7px; border-radius: 2px;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
    }
    .badge-age {
      position: absolute; top: 7px; right: 7px;
      background: rgba(139,26,26,0.2); border: 1px solid rgba(139,26,26,0.4);
      color: #E07070; font-size: 9px;
      padding: 2px 6px; border-radius: 2px;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
    }
    .no-poster {
      aspect-ratio: 2/3; width: 100%;
      background: var(--bg2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: rgba(201,168,76,0.2);
      font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 2px;
    }

    /* Section */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Playfair Display', serif; font-size: 20px;
      font-weight: 700; color: var(--tx);
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 20px;
      background: var(--gold); border-radius: 2px;
    }
    .section-link {
      font-family: 'Bebas Neue', sans-serif; font-size: 12px;
      color: var(--txd); text-decoration: none;
      display: flex; align-items: center; gap: 5px;
      letter-spacing: 1px; transition: color 0.2s;
    }
    .section-link:hover { color: var(--gold); }
    .movies-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 14px;
    }
    .movies-scroll {
      display: flex; gap: 12px;
      overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: var(--gold) var(--bg2);
    }
    .movies-scroll .movie-card { width: 148px; min-width: 148px; flex-shrink: 0; }
    .gold-divider {
      height: 1px; margin: 40px 0;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    }

    /* Animations */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: fadeSlideUp 0.5s ease-out 0.1s both; }
    .anim-2 { animation: fadeSlideUp 0.5s ease-out 0.2s both; }
    .anim-3 { animation: fadeSlideUp 0.5s ease-out 0.3s both; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Scan line */
    .cs-scan { position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
      z-index: 3; pointer-events: none; animation: csScan 7s ease-in-out infinite; }
    @keyframes csScan {
      0% { top: 0; opacity: 0; } 5% { opacity: 1; } 95% { opacity: 0.3; } 100% { top: 100%; opacity: 0; }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body style="background:var(--bg);color:var(--tx);min-height:100vh">
  <meta name="htmx-config" content='{"defaultSwapStyle":"innerHTML","requestClass":"loading"}' />

  {% include "components/navbar.html" %}
  {% include "components/toast.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "components/footer.html" %}

  {% load static %}
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
