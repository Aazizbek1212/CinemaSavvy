<!DOCTYPE html>
<html lang="uz" class="dark" x-data="appState()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="description"
        content="{% block meta_description %}Cinema.uz — O'zbekistonning eng yaxshi kino platformasi{% endblock %}" />
  <title>{% block title %}Cinema.uz{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              950: '#0A0A0A', 900: '#111111', 800: '#1A1A1A',
              700: '#242424', 600: '#2E2E2E', 500: '#3A3A3A',
              400: '#525252', 300: '#6B6B6B', 200: '#A3A3A3',
            },
            gold: {
              400: '#FBBF24', 500: '#F5C518',
              600: '#D97706', 700: '#B45309',
            },
            emerald: { 400: '#34D399', 500: '#10B981', 600: '#059669' },
            crimson: { 400: '#F87171', 500: '#EF4444', 600: '#DC2626' },
          }
        }
      }
    }
  </script>

  <!-- Alpine.js — defer bo'lishi SHART -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

  <!-- HTMX — integrity YO'Q -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Video.js -->
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.6.1/video-js.css" />

  <!-- Custom CSS -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-ink-950 text-ink-200 min-h-screen font-sans antialiased">

  <meta name="htmx-config" content='{"defaultSwapStyle":"innerHTML","requestClass":"loading"}' />

  {% include "components/navbar.html" %}
  {% include "components/toast.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "components/footer.html" %}

  {% load static %}
  <script src="{% static 'js/app.js' %}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
